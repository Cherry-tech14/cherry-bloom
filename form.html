<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Page title</title>
    </head>
    <body>
        <form action="#" method="post" target="_blank">
            <label for="fname">First Name</label><br>
            <input type="text" id="fname" name="first-name" placeholder="Enter your First Name"><br><br>

            <label for="lname">Last Name</label><br>
            <input type="text" id="lname" name="lastname-name" placeholder="Enter your Last Name"><br><br>

            <label for="email">Email</label><br>
            <input type="email" id="email" name="email-address" placeholder="Enter your Email address"><br><br>

            <label for="dob">Date of Birth</label><br>
            <input type="date" id="dob" name="Date of Birth"><br><br>

            <label for="age">Age:</label><br>
            <input type="number" id="age" name="age" min="18" max="45"><br><br>

            <label for="tpn">Telephone:</label><br>
            <input type="tel" id="tpn" name="phone-number" placeholder="+234..."><br><br>

            <label for="gender">Gender:</label><br><br>
            <label for="male">Male</label>
            <input type="radio"  id="male" name="gender"value="male">

            <label for="female">Female</label>
            <input type="radio"  id="female" name="gender"value="female"><br><br>



            <input type="submit" value="Submit">

        
        </form>
    </body>
</html>
